name: Publish Home Assistant viewer image

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: publish-viewer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: python -m pip install -e '.[dev]'
      - run: ruff format --check . && ruff check . && mypy personal_video_studio/app && pytest -q
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.17.0"
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm lint && pnpm typecheck && pnpm test
      - run: pnpm exec playwright install --with-deps chromium
      - run: python -m venv .venv && .venv/bin/pip install -e '.[dev]'
      - run: .venv/bin/python tests/create_e2e_fixture.py
      - run: pnpm e2e
  scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker build --build-arg BUILD_VERSION="${GITHUB_REF_NAME#v}" --build-arg BUILD_ARCH=amd64 -t local/personal-video-studio:publish-scan personal_video_studio
      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: local/personal-video-studio:publish-scan
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
  publish:
    needs: [quality, scan]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: personal_video_studio
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.value }}
            BUILD_ARCH=aarch64|amd64
          provenance: mode=max
          sbom: true
