name: Personal Video Studio
version: "0.2.0"
slug: personal_video_studio
description: Private mobile-first and desktop video library for Home Assistant
url: https://github.com/resace3/home-assistant-personal-video-addon
arch:
  - aarch64
  - amd64
stage: stable
image: ghcr.io/resace3/home-assistant-personal-video-addon
init: false
backup: cold
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:play-box-multiple-outline
panel_title: Personal Videos
panel_admin: true
environment:
  VIDEO_ROOT: /share/personal_video_studio
map:
  - type: share
    read_only: true
    path: /share
options:
  default_tab: feed
  autoplay: true
  start_muted: true
  show_daily_videos: true
  show_weekly_videos: true
  enable_insights: true
schema:
  default_tab: list(feed|library|insights|settings)
  autoplay: bool
  start_muted: bool
  show_daily_videos: bool
  show_weekly_videos: bool
  enable_insights: bool
