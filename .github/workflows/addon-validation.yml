name: Add-on validation and containers
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: addon-container-${{ github.ref }}
  cancel-in-progress: true
jobs:
  metadata:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: personal_video_studio
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: personal_video_studio
          platforms: ${{ matrix.platform }}
          push: false
          tags: local/personal-video-studio:${{ matrix.arch }}
          build-args: |
            BUILD_VERSION=0.2.3
            BUILD_ARCH=${{ matrix.arch }}
      - name: Load and health-test architecture under QEMU
        run: |
          docker buildx build --platform '${{ matrix.platform }}' --load --build-arg BUILD_VERSION=0.2.3 --build-arg 'BUILD_ARCH=${{ matrix.arch }}' -t local/personal-video-studio:${{ matrix.arch }} personal_video_studio
          mkdir -p /tmp/studio-share/personal_video_studio/indexes /tmp/studio-data
          echo '[]' > /tmp/studio-share/personal_video_studio/indexes/all.json
          docker run -d --name studio-${{ matrix.arch }} -p 8765:8099 -e ALLOW_DIRECT=1 -v /tmp/studio-share:/share:ro -v /tmp/studio-data:/data local/personal-video-studio:${{ matrix.arch }}
          for attempt in $(seq 1 20); do docker exec studio-${{ matrix.arch }} curl -fsS http://127.0.0.1:8099/api/health && break; sleep 1; done
          docker exec studio-${{ matrix.arch }} curl -fsS http://127.0.0.1:8099/api/health
          docker rm -f studio-${{ matrix.arch }}
