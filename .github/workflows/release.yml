name: Release
on:
  push:
    tags: ["v*.*.*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: python -m pip install -e '.[dev]' cyclonedx-bom && ruff check . && mypy personal_video_studio/app && pytest -q
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "22.17.0"
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm lint && pnpm typecheck && pnpm test
      - run: python -m venv .venv && .venv/bin/pip install -e '.[dev]'
      - run: .venv/bin/python tests/create_e2e_fixture.py
      - run: pnpm exec playwright install --with-deps chromium && pnpm e2e
      - run: >-
          test "v$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')" = "$GITHUB_REF_NAME"
          && grep -q "version: \"${GITHUB_REF_NAME#v}\"" personal_video_studio/config.yaml
      - uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: personal_video_studio
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: tar --exclude='.git' --exclude='.venv' --exclude='node_modules' --exclude='test-results' -czf personal-video-studio-${{ github.ref_name }}.tar.gz personal_video_studio repository.yaml README.md LICENSE
      - run: docker build --build-arg BUILD_VERSION="${GITHUB_REF_NAME#v}" --build-arg BUILD_ARCH=amd64 -t local/personal-video-studio:release personal_video_studio
      - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: local/personal-video-studio:release
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - run: cyclonedx-py requirements personal_video_studio/requirements.lock --output-file sbom.cdx.json && sha256sum personal-video-studio-${{ github.ref_name }}.tar.gz sbom.cdx.json > SHA256SUMS
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: |
            personal-video-studio-${{ github.ref_name }}.tar.gz
            SHA256SUMS
            sbom.cdx.json
